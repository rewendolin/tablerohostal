<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostal Matilda's — Gestión</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--accent:#c8a96e;--text:#e8e4dc;--muted:#6b6b6b;--booking:#4a7eb8;--airbnb:#c85a7e;--manual:#7eb87e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;flex-wrap:wrap;gap:10px;}
.logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);}
.logo span{color:var(--text);font-weight:400;}
nav{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;}
nav button{background:none;border:none;color:var(--muted);padding:7px 13px;border-radius:5px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;}
nav button.active{background:var(--accent);color:var(--bg);}
nav button:hover:not(.active){color:var(--text);background:var(--surface2);}
.hdate{font-size:11px;color:var(--muted);}
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 28px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.sdot.syncing{background:var(--accent);animation:pulse 1s infinite;}
.sdot.ok{background:#7ec89a;}.sdot.error{background:#c87e7e;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.src-leg{margin-left:auto;display:flex;gap:12px;}
.sli{display:flex;align-items:center;gap:4px;font-size:10px;}
.sld{width:10px;height:10px;border-radius:2px;}
main{padding:22px 28px;max-width:1400px;margin:0 auto;}
.view{display:none;}.view.active{display:block;}

/* CARDS */
.dcards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;}
.rcard:hover{transform:translateY(-2px);border-color:var(--accent);}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.rc2::before{background:#c8a96e;}.rc4::before{background:#7eb8c8;}.rc6::before{background:#a8c87e;}.rc8::before{background:#c87ea8;}.rc9::before{background:#c8a07e;}
.rnum{font-family:'Playfair Display',serif;font-size:13px;color:var(--muted);margin-bottom:2px;}
.rname{font-family:'Playfair Display',serif;font-size:20px;line-height:1.1;margin-bottom:10px;}
.rbadge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.st-free{background:rgba(74,124,89,.2);color:#7ec89a;border:1px solid rgba(74,124,89,.4);}
.st-occ{background:rgba(74,126,184,.2);color:#7eb8f0;border:1px solid rgba(74,126,184,.4);}
.st-ci{background:rgba(200,169,110,.2);color:var(--accent);border:1px solid rgba(200,169,110,.4);}
.st-co{background:rgba(124,74,74,.2);color:#c87e7e;border:1px solid rgba(124,74,74,.4);}
.rnext{font-size:11px;color:var(--muted);line-height:1.6;}
.rnext strong{color:var(--text);}

.stitle{font-family:'Playfair Display',serif;font-size:17px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.stitle::after{content:'';flex:1;height:1px;background:var(--border);}

/* TASKS */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
.tpanel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.tpanel h3{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.tpanel h3::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent);}
.titem{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.titem:last-child{border-bottom:none;}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tchk{width:17px;height:17px;border:1px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.tchk.done{background:var(--accent);border-color:var(--accent);}
.tchk.done::after{content:'✓';font-size:10px;color:var(--bg);}
.ttxt{flex:1;}.ttxt.done{text-decoration:line-through;color:var(--muted);}

.sbadge{font-size:9px;padding:2px 6px;border-radius:10px;letter-spacing:.05em;text-transform:uppercase;flex-shrink:0;}
.sb-booking{background:rgba(74,126,184,.25);color:#7eb8f0;border:1px solid rgba(74,126,184,.4);}
.sb-airbnb{background:rgba(200,90,126,.25);color:#e87ea8;border:1px solid rgba(200,90,126,.4);}
.sb-manual{background:rgba(126,184,126,.2);color:#a0d0a0;border:1px solid rgba(126,184,126,.3);}

/* SUGGESTIONS */
.scard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:grid;grid-template-columns:100px 1fr 1fr;gap:14px;align-items:start;margin-bottom:9px;}
.scard.urgent{border-color:#7c4a4a;}.scard.today{border-color:var(--accent);}

/* BOOKING LIST */
.blist{display:flex;flex-direction:column;gap:7px;}
.bitem{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:12px;}
.binfo{flex:1;}.bguest{font-size:12px;color:var(--text);margin-bottom:1px;}.bdates{color:var(--muted);font-size:11px;}
.brtag{padding:2px 9px;border-radius:20px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;flex-shrink:0;}
.delbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:3px;transition:color .2s;}
.delbtn:hover{color:#c87e7e;}

/* CALENDAR WRAPPER */
.calwrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.calhead{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);}
.caltitle{font-family:'Playfair Display',serif;font-size:17px;}
.calnav{display:flex;gap:7px;}
.calnav button{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:15px;transition:all .2s;}
.calnav button:hover{border-color:var(--accent);color:var(--accent);}
.leg{display:flex;gap:14px;padding:10px 20px;border-top:1px solid var(--border);flex-wrap:wrap;}
.li2{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.ldot{width:9px;height:9px;border-radius:2px;}

/* WEEKLY — 2 col grid: label | timeline */
.wgrid{display:grid;grid-template-columns:90px 1fr;}
.whead-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);}
.wdhead{padding:9px 5px;text-align:center;}
.wdn{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.wdnum{font-family:'Playfair Display',serif;font-size:19px;line-height:1.1;}
.wdhead.tc .wdnum{color:var(--accent);}
.wrl{padding:0 10px;display:flex;align-items:center;gap:6px;font-size:11px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);min-height:64px;}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.wtimeline{position:relative;border-bottom:1px solid var(--border);height:64px;overflow:visible;}

/* MONTHLY */
.mgrid{display:grid;}
.mch{padding:7px 3px;text-align:center;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.mch.tc{color:var(--accent);background:rgba(200,169,110,.05);}
.mrl-month{padding:0 8px;display:flex;align-items:center;font-size:10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;gap:4px;}
.mcell{height:36px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);cursor:pointer;position:relative;transition:background .15s;}
.mcell:hover{background:var(--surface2);}.mcell.tc{background:rgba(200,169,110,.04);}
.mcell.ob{background:rgba(74,126,184,.28);}.mcell.oa{background:rgba(200,90,126,.22);}.mcell.om{background:rgba(126,184,126,.18);}
.clbl{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:8px;white-space:nowrap;color:rgba(232,228,220,.6);}

/* ROOMS TIMELINE */
.rtl{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.rtlh{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--surface2);}
.rclrbar{width:4px;height:32px;border-radius:2px;}
.rtlt{font-family:'Playfair Display',serif;font-size:16px;}
.rtlb{padding:12px 18px;}
.btrack{height:28px;background:var(--bg);border-radius:4px;position:relative;overflow:hidden;border:1px solid var(--border);margin-bottom:10px;}
.bbar{position:absolute;top:0;bottom:0;display:flex;align-items:center;padding:0 7px;font-size:9px;white-space:nowrap;overflow:hidden;}
.bb-booking{background:rgba(74,126,184,.45);border-left:3px solid var(--booking);}
.bb-airbnb{background:rgba(200,90,126,.4);border-left:3px solid var(--airbnb);}
.bb-manual{background:rgba(126,184,126,.3);border-left:3px solid var(--manual);}

/* MODAL */
.movl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:center;justify-content:center;}
.movl.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:26px;width:400px;max-width:95vw;position:relative;}
.modal h2{font-family:'Playfair Display',serif;font-size:19px;margin-bottom:18px;color:var(--accent);}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--accent);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.btnrow{display:flex;gap:9px;margin-top:16px;justify-content:flex-end;}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.05em;transition:all .2s;}
.btnp{background:var(--accent);color:var(--bg);}.btnp:hover{background:#d4b87e;}
.btns{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btns:hover{border-color:var(--accent);}
.mcls{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);font-size:19px;cursor:pointer;}
.fab{position:fixed;bottom:26px;right:26px;background:var(--accent);color:var(--bg);border:none;border-radius:50px;padding:12px 20px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 4px 22px rgba(200,169,110,.3);transition:all .2s;z-index:50;}
.fab:hover{transform:translateY(-2px);}
.empty{text-align:center;padding:26px;color:var(--muted);font-size:12px;}
@media(max-width:900px){.dcards{grid-template-columns:repeat(3,1fr);}.tgrid{grid-template-columns:1fr;}main,header,.sync-bar{padding-left:14px;padding-right:14px;}}
@media(max-width:600px){.dcards{grid-template-columns:1fr 1fr;}.scard{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div class="logo">Hostal <span>Matilda's</span></div>
  <nav>
    <button class="active" onclick="showView('dashboard')">Tablero</button>
    <button onclick="showView('weekly')">Semana</button>
    <button onclick="showView('monthly')">Mes</button>
    <button onclick="showView('rooms')">Habitaciones</button>
  </nav>
  <div class="hdate" id="headerDate"></div>
</header>
<div class="sync-bar">
  <div class="sdot" id="syncDot"></div>
  <span id="syncStatus">Conectando...</span>
  <div class="src-leg">
    <div class="sli"><div class="sld" style="background:rgba(74,126,184,.6)"></div>Booking</div>
    <div class="sli"><div class="sld" style="background:rgba(200,90,126,.55)"></div>Airbnb</div>
    <div class="sli"><div class="sld" style="background:rgba(126,184,126,.45)"></div>Manual</div>
  </div>
</div>
<main>
  <div class="view active" id="view-dashboard">
    <div class="dcards" id="roomCards"></div>
    <p class="stitle">Tareas del día</p>
    <div class="tgrid">
      <div class="tpanel"><h3>Limpieza hoy</h3><div id="cleaningTasks"></div></div>
      <div class="tpanel"><h3>Próximos check-outs y check-ins</h3><div id="upcomingEvents"></div></div>
    </div>
    <p class="stitle">Planificación de limpieza — próximos 14 días</p>
    <div id="cleaningSuggestions" style="margin-bottom:22px"></div>
    <p class="stitle">Próximas reservas</p>
    <div class="blist" id="upcomingBookings"></div>
  </div>

  <div class="view" id="view-weekly">
    <div class="calwrap">
      <div class="calhead">
        <div class="caltitle" id="weekTitle"></div>
        <div class="calnav">
          <button onclick="changeWeek(-1)">‹</button>
          <button onclick="changeWeek(0)">Hoy</button>
          <button onclick="changeWeek(1)">›</button>
        </div>
      </div>
      <div id="weekGrid"></div>
      <div class="leg">
        <div class="li2"><div class="ldot" style="background:rgba(74,126,184,.55)"></div>Booking</div>
        <div class="li2"><div class="ldot" style="background:rgba(200,90,126,.5)"></div>Airbnb</div>
        <div class="li2"><div class="ldot" style="background:rgba(126,184,126,.4)"></div>Manual</div>
        <div class="li2"><div class="ldot" style="background:rgba(200,74,74,.6)"></div>⚠️ Doble reserva</div>
        <div class="li2">↓ Check-in · ↑ Check-out</div>
      </div>
    </div>
  </div>

  <div class="view" id="view-monthly">
    <div class="calwrap">
      <div class="calhead">
        <div class="caltitle" id="monthTitle"></div>
        <div class="calnav">
          <button onclick="changeMonth(-1)">‹</button>
          <button onclick="changeMonth(0)">Hoy</button>
          <button onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div style="overflow-x:auto"><div class="mgrid" id="monthGrid" style="min-width:700px"></div></div>
      <div class="leg">
        <div class="li2"><div class="ldot" style="background:rgba(74,126,184,.4)"></div>Booking ocupada</div>
        <div class="li2"><div class="ldot" style="background:rgba(200,90,126,.38)"></div>Airbnb ocupada</div>
        <div class="li2"><div class="ldot" style="background:rgba(126,184,126,.35)"></div>Manual</div>
      </div>
    </div>
  </div>

  <div class="view" id="view-rooms"><div id="roomTimelines"></div></div>
</main>

<button class="fab" onclick="openModal()">+ Nueva Reserva</button>
<div class="movl" id="modalOverlay">
  <div class="modal">
    <button class="mcls" onclick="closeModal()">×</button>
    <h2>Nueva Reserva</h2>
    <div class="fg"><label>Nombre del Huésped</label><input type="text" id="guestName" placeholder="Ej: María García"></div>
    <div class="fg"><label>Habitación</label>
      <select id="roomSelect">
        <option value="2">H2 — Matilda's</option>
        <option value="4">H4 — Catedral</option>
        <option value="6">H6 — Roma</option>
        <option value="8">H8 — Venecia</option>
        <option value="9">H9 — Murano</option>
      </select>
    </div>
    <div class="frow">
      <div class="fg"><label>Check-in</label><input type="date" id="checkIn"></div>
      <div class="fg"><label>Check-out</label><input type="date" id="checkOut"></div>
    </div>
    <div class="fg"><label>Origen</label>
      <select id="bookingSource">
        <option value="manual">Manual / Directo</option>
        <option value="booking">Booking.com</option>
        <option value="airbnb">Airbnb</option>
      </select>
    </div>
    <div class="fg"><label>Notas (opcional)</label><textarea id="notes" rows="2"></textarea></div>
    <div class="btnrow">
      <button class="btn btns" onclick="closeModal()">Cancelar</button>
      <button class="btn btnp" onclick="saveBooking()">Guardar</button>
    </div>
  </div>
</div>

<script>
const ROOMS=[
  {id:2,name:"Matilda's",color:'#c8a96e',ical:'https://ical.booking.com/v1/export?t=ede17b7c-a381-44d9-97bb-cc8ac4cbe19a'},
  {id:4,name:'Catedral',  color:'#7eb8c8',ical:'https://ical.booking.com/v1/export?t=29a83819-1fc5-491c-9678-43067623e713'},
  {id:6,name:'Roma',      color:'#a8c87e',ical:'https://ical.booking.com/v1/export?t=f09436f1-204e-4d4a-878c-a9f4c8a14495'},
  {id:8,name:'Venecia',   color:'#c87ea8',ical:'https://ical.booking.com/v1/export?t=e73f2a8a-b083-4f14-8905-996fc2366100'},
  {id:9,name:'Murano',    color:'#c8a07e',ical:'https://ical.booking.com/v1/export?t=baa937fc-2e1f-465e-ae25-ae48f5771ef6'},
];
const AIRBNB=[
  {roomId:2,url:'https://www.airbnb.es/calendar/ical/843475320887968032.ics?t=870f1189c54b48f6ae564c839e71824f'},
  {roomId:4,url:'https://www.airbnb.es/calendar/ical/1286161550278181700.ics?t=2d3867e24bc8461bb456dcab25cdda5b'},
  {roomId:6,url:'https://www.airbnb.es/calendar/ical/843482246685587440.ics?t=c50c1d08e0d34021ab9fe9e03ab513d1'},
  {roomId:9,url:'https://www.airbnb.es/calendar/ical/1258736431304816157.ics?t=0414f40b1165473ba6ff2c43eff7e064'},
];
const PROXIES=[
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url=',
];

async function fetchWithProxy(url){
  for(const proxy of PROXIES){
    try{
      const r=await fetch(proxy+encodeURIComponent(url));
      if(r.ok){const t=await r.text();if(t.includes('BEGIN:VCALENDAR'))return t;}
    }catch{}
  }
  return null;
}

let icalBs=[], manualBs=JSON.parse(localStorage.getItem('hm_v3')||'[]');
let tasks=JSON.parse(localStorage.getItem('hm_tasks')||'{}');
let wOff=0, mOff=0;

// Clear old corrupted cache if it exists from previous Netlify deployment
const cacheVersion='v2';
if(localStorage.getItem('hm_cache_version')!==cacheVersion){
  localStorage.removeItem('hm_ical_cache');
  localStorage.setItem('hm_cache_version',cacheVersion);
}

const today=new Date(); today.setHours(0,0,0,0);
const fmt=d=>d.toISOString().split('T')[0];
const fmtD=s=>{const d=new Date(s+'T00:00:00');return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});};
const pd=s=>{const d=new Date(s+'T00:00:00');d.setHours(0,0,0,0);return d;};
const sd=(a,b)=>fmt(a)===fmt(b);
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const allBs=()=>[...icalBs,...manualBs];
const saveD=()=>localStorage.setItem('hm_v3',JSON.stringify(manualBs));
const srcClr=s=>s==='airbnb'?'var(--airbnb)':s==='manual'?'var(--manual)':'var(--booking)';
const srcBg=s=>s==='airbnb'?'rgba(200,90,126,.35)':s==='manual'?'rgba(126,184,126,.25)':'rgba(74,126,184,.35)';

// ── iCAL PARSER ──────────────────────────────────────────────────────────────
// DTEND is exclusive in both Booking and Airbnb iCal (checkout day = first free day)
function parseIcal(txt,roomId,src){
  const evs=[];
  txt.split('BEGIN:VEVENT').slice(1).forEach(b=>{
    const s=(b.match(/DTSTART[^:]*:(\d{8})/)||[])[1];
    const e=(b.match(/DTEND[^:]*:(\d{8})/)||[])[1];
    const u=(b.match(/UID:(.+)/)||[])[1];
    if(!s||!e)return;
    const ci=`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
    const co=`${e.slice(0,4)}-${e.slice(4,6)}-${e.slice(6,8)}`;
    // Keep all bookings (including past) for monthly history view
    evs.push({id:u?.trim(),room:roomId,guest:'',checkIn:ci,checkOut:co,source:src,notes:''});
  });
  return evs;
}

async function syncIcals(){
  const dot=document.getElementById('syncDot');
  const st=document.getElementById('syncStatus');
  dot.className='sdot syncing'; st.textContent='Sincronizando...';

  // Load cached ical bookings first so past reservations are always shown
  const cached=JSON.parse(localStorage.getItem('hm_ical_cache')||'[]');
  if(cached.length) icalBs=cached;

  const fetches=[
    ...ROOMS.map(r=>fetchWithProxy(r.ical).then(t=>t?parseIcal(t,r.id,'booking'):[]).catch(()=>[])),
    ...AIRBNB.map(a=>fetchWithProxy(a.url).then(t=>t?parseIcal(t,a.roomId,'airbnb'):[]).catch(()=>[])),
  ];
  try{
    const res=await Promise.all(fetches);
    const fresh=res.flat();
    if(fresh.length>0){
      // Merge: keep cached past bookings + all fresh bookings
      const today_str=fmt(today);
      const pastCached=cached.filter(b=>b.checkOut<today_str);
      // Deduplicate by uid
      const freshIds=new Set(fresh.map(b=>b.id));
      const pastUnique=pastCached.filter(b=>!freshIds.has(b.id));
      icalBs=[...pastUnique,...fresh];
      localStorage.setItem('hm_ical_cache',JSON.stringify(icalBs));
    }
    dot.className='sdot ok';
    const now=new Date();
    const nb=icalBs.filter(b=>b.source==='booking').length;
    const na=icalBs.filter(b=>b.source==='airbnb').length;
    st.textContent=`Sincronizado · ${nb} Booking · ${na} Airbnb · ${now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}`;
  }catch{
    dot.className='sdot error';st.textContent='Error de sincronización — usando caché';
  }
  renderAll();
}

// ── STATUS (checkout day = room is FREE that day) ────────────────────────────
function getRoomStatus(rid){
  const ds=fmt(today), bs=allBs().filter(b=>b.room==rid);
  // checkIn === today → arriving today
  // checkOut === today → departed (room free from today)
  // checkIn < today && checkOut > today → occupied
  const ci=bs.find(b=>b.checkIn===ds);
  const occ=bs.find(b=>b.checkIn<ds&&b.checkOut>ds);
  if(ci&&occ)return{label:'Entrada/Salida',cls:'st-ci',e:'⟳'};
  if(ci)return{label:'Check-in hoy',cls:'st-ci',e:'↓'};
  // check if someone checked out today (was occupied yesterday)
  const co=bs.find(b=>b.checkOut===ds);
  if(co&&!occ)return{label:'Check-out hoy',cls:'st-co',e:'↑'};
  if(occ)return{label:'Ocupada',cls:'st-occ',e:'●'};
  return{label:'Libre',cls:'st-free',e:'○'};
}

function nextEv(rid){
  const ds=fmt(today);
  return allBs().filter(b=>b.room==rid&&b.checkIn>=ds).sort((a,b)=>a.checkIn.localeCompare(b.checkIn))[0]||null;
}

}

        h+=`<div class="titem" style="padding:4px 0"><div class="tdot" style="background:${r.color}"></div>

// ── SMART CLEANING SUGGESTIONS ───────────────────────────────────────────────
function renderSuggestions(){
  const el=document.getElementById('cleaningSuggestions');
  const ds=fmt(today),h14=fmt(addD(today,14));
  const wins=[],proc=new Set();
  ROOMS.forEach(r=>{
    const rbs=allBs().filter(b=>b.room==r.id).sort((a,b)=>a.checkOut.localeCompare(b.checkOut));
    rbs.forEach(b=>{
      // checkout = first free day. Clean on that day.
      if(b.checkOut<ds||b.checkOut>h14)return;
      const nx=rbs.find(n=>n.checkIn>=b.checkOut);
      wins.push({r,co:b.checkOut,nci:nx?.checkIn||null,src:b.source||'booking'});
    });
  });
  if(!wins.length){el.innerHTML='<div class="empty" style="background:var(--surface);border:1px solid var(--border);border-radius:10px">Sin salidas en los próximos 14 días</div>';return;}
  const sugs=[];
  wins.forEach(w=>{
    const k=w.r.id+'_'+w.co;if(proc.has(k))return;proc.add(k);
    const comp=wins.filter(o=>{
      const k2=o.r.id+'_'+o.co;if(proc.has(k2)||o===w)return false;
      if(Math.abs((pd(o.co)-pd(w.co))/86400000)>2)return false;
      const lco=o.co>w.co?o.co:w.co;
      const mci=Math.min(w.nci?pd(w.nci):Infinity,o.nci?pd(o.nci):Infinity);
      return pd(lco)<mci;
    });
    comp.forEach(c=>proc.add(c.r.id+'_'+c.co));
    const batch=[w,...comp];
    const optDay=batch.reduce((mx,x)=>x.co>mx?x.co:mx,w.co);
    const dl=batch.map(x=>x.nci).filter(Boolean).sort()[0]||null;
    const wd=dl?Math.round((pd(dl)-pd(optDay))/86400000):99;
    sugs.push({batch,optDay,dl,wd,urgent:wd<=1,isT:optDay===ds});
  });
  sugs.sort((a,b)=>a.optDay.localeCompare(b.optDay));
  el.innerHTML=sugs.map(s=>{
    const dLbl=s.isT?'<span style="color:var(--accent)">HOY</span>':fmtD(s.optDay);
    const urgB=s.urgent?'<span style="background:rgba(124,74,74,.3);color:#c87e7e;border:1px solid rgba(124,74,74,.5);padding:2px 6px;border-radius:20px;font-size:9px;margin-left:5px">⚡</span>':'';
    const grpB=s.batch.length>1?'<span style="background:rgba(200,169,110,.15);color:var(--accent);border:1px solid rgba(200,169,110,.3);padding:2px 6px;border-radius:20px;font-size:9px;margin-left:5px">Juntas</span>':'';
    const rooms=s.batch.map(w=>`<span style="color:${w.r.color}">H${w.r.id} ${w.r.name}</span> <span style="color:var(--muted);font-size:10px">(sale ${fmtD(w.co)})</span>`).join('<br>');
    const mc=s.urgent?'#c87e7e':s.wd>3?'#7ec89a':'var(--text)';
    const ml=s.dl?`Antes de ${fmtD(s.dl)} · ${s.wd}d`:'Sin reserva siguiente';
    return `<div class="scard ${s.urgent?'urgent':s.isT?'today':''}">
      <div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px">Limpiar el</div><div style="font-family:'Playfair Display',serif;font-size:17px">${dLbl}${urgB}${grpB}</div></div>
      <div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">Hab${s.batch.length>1?'itaciones':'itación'}</div><div style="font-size:12px;line-height:1.7">${rooms}</div></div>
      <div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px">Margen</div><div style="font-size:12px;color:${mc}">${ml}</div></div>
    </div>`;
  }).join('');
}

// ── WEEKLY (continuous bars) ─────────────────────────────────────────────────
function renderWeekly(){
  const mon=new Date(today);const dow=mon.getDay()||7;mon.setDate(mon.getDate()-dow+1+wOff*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(d.getDate()+i);return d;});
  const dns=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const wS=days[0],wE=days[6];
  document.getElementById('weekTitle').textContent=
    `Semana del ${wS.toLocaleDateString('es-ES',{day:'numeric',month:'long'})} al ${wE.toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'})}`;

  // Header
  let h=`<div class="wgrid" style="border-bottom:1px solid var(--border)">
    <div style="border-right:1px solid var(--border)"></div>
    <div class="whead-row">`;
  days.forEach((d,i)=>{
    const isT=sd(d,today);
    h+=`<div class="wdhead ${isT?'tc':''}"><div class="wdn">${dns[i]}</div><div class="wdnum" style="${isT?'':'color:var(--text)'}">${d.getDate()}</div></div>`;
  });
  h+='</div></div>';

  // Room rows
  ROOMS.forEach(r=>{
    h+=`<div class="wgrid">
      <div class="wrl"><div class="rdot" style="background:${r.color}"></div><span style="font-size:10px">H${r.id}<br>${r.name}</span></div>
      <div class="wtimeline">`;

    // Day separators & today highlight
    days.forEach((d,i)=>{
      if(sd(d,today))h+=`<div style="position:absolute;left:${i/7*100}%;width:${1/7*100}%;top:0;bottom:0;background:rgba(200,169,110,.04);pointer-events:none"></div>`;
      if(i>0)h+=`<div style="position:absolute;left:${i/7*100}%;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none"></div>`;
    });

    const rbs=allBs().filter(b=>b.room==r.id);

    // Group by source so bars never overlap visually
    // booking bars on top half, airbnb on bottom half when both present on same day
    const bookingBs=rbs.filter(b=>(b.source||'booking')==='booking');
    const airbnbBs=rbs.filter(b=>b.source==='airbnb');
    const manualBs2=rbs.filter(b=>b.source==='manual');

    // Check if any airbnb bar is visible this week
    const hasAirbnbThisWeek=airbnbBs.some(b=>pd(b.checkIn)<addD(wE,1)&&pd(b.checkOut)>wS);
    const hasBookingThisWeek=bookingBs.some(b=>pd(b.checkIn)<addD(wE,1)&&pd(b.checkOut)>wS);
    const splitRows=hasAirbnbThisWeek&&hasBookingThisWeek;

    // top=booking, bottom=airbnb when split; else full height
    const rowTop=(src)=>{
      if(!splitRows)return 6;
      return src==='airbnb'?30:6;
    };
    const rowH=(src)=>{
      if(!splitRows)return 44;
      return 22;
    };

    function hasOverlap(b){
      return rbs.some(o=>
        o!==b && o.id!==b.id &&
        o.source===b.source &&
        pd(o.checkIn)<pd(b.checkOut) &&
        pd(o.checkOut)>pd(b.checkIn) &&
        !(pd(o.checkOut).getTime()===pd(b.checkIn).getTime()) &&
        !(pd(b.checkOut).getTime()===pd(o.checkIn).getTime())
      );
    }

    rbs.forEach(b=>{
      const ciD=pd(b.checkIn),coD=pd(b.checkOut);
      const wEnd1=addD(wE,1);
      if(ciD>=wEnd1||coD<=wS)return;

      const overlap=hasOverlap(b);
      const src=b.source||'booking';
      const clr=overlap?'#c84a4a':srcClr(src);
      const bg=overlap?'rgba(200,74,74,.45)':srcBg(src);

      const isStartVis=ciD>=wS, isEndVis=coD<=wEnd1&&coD>wS;
      const ciDayIdx=(ciD-wS)/86400000;
      const coDayIdx=(coD-wS)/86400000;

      const barLeft=isStartVis?(ciDayIdx+0.5)/7*100:0;
      const barRight=isEndVis?(coDayIdx+0.5)/7*100:100;
      const left=Math.max(0,barLeft).toFixed(2);
      const width=Math.max(0.5,barRight-barLeft).toFixed(2);

      const top=rowTop(src);
      const barHeight=rowH(src);
      const rl=`${isStartVis?'5px':'0'} ${isEndVis?'5px':'0'} ${isEndVis?'5px':'0'} ${isStartVis?'5px':'0'}`;
      const warningIcon=overlap?'⚠️ ':'';
      const showName=isStartVis&&barHeight>18;

      h+=`<div style="position:absolute;left:${left}%;width:${width}%;top:${top}px;height:${barHeight}px;background:${bg};border-radius:${rl};border-left:${isStartVis?'3px solid '+clr:'none'};border-right:${isEndVis?'3px solid '+clr:'none'};display:flex;align-items:center;padding:0 7px;overflow:hidden;cursor:pointer;z-index:2;"
        onclick="openModalDate('${r.id}','${fmt(ciD)}')" title="${overlap?'⚠️ DOBLE RESERVA: ':''}${b.guest||'Reservado'}: ${fmtD(b.checkIn)} → ${fmtD(b.checkOut)}">
        <span style="font-size:${barHeight>22?10:9}px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${showName?warningIcon+(b.guest||'Reservado'):''}</span>
      </div>`;

      if(isStartVis){
        const px=(ciDayIdx/7*100).toFixed(2);
        h+=`<div style="position:absolute;left:calc(${px}% + 3px);top:3px;font-size:9px;color:#7ec89a;z-index:3;pointer-events:none">↓</div>`;
      }
      if(isEndVis&&coD>wS){
        const px=(coDayIdx/7*100).toFixed(2);
        h+=`<div style="position:absolute;left:calc(${px}% - 12px);top:3px;font-size:9px;color:#c87e7e;z-index:3;pointer-events:none">↑</div>`;
      }
    });

    // Clickable day zones
    days.forEach((d,i)=>{
      h+=`<div style="position:absolute;left:${i/7*100}%;width:${1/7*100}%;top:0;bottom:0;z-index:1" onclick="openModalDate('${r.id}','${fmt(d)}')"></div>`;
    });

    h+='</div></div>';
  });

  document.getElementById('weekGrid').innerHTML=h;
}
function changeWeek(d){if(d===0)wOff=0;else wOff+=d;renderWeekly();}

// ── MONTHLY ──────────────────────────────────────────────────────────────────
function renderMonthly(){
  const base=new Date(today.getFullYear(),today.getMonth()+mOff,1);
  const dim=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
  document.getElementById('monthTitle').textContent=
    base.toLocaleDateString('es-ES',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());

  const mStart=new Date(base.getFullYear(),base.getMonth(),1);
  const mEnd=new Date(base.getFullYear(),base.getMonth()+1,0);
  const days=Array.from({length:dim},(_,i)=>new Date(base.getFullYear(),base.getMonth(),i+1));
  const cols=`90px repeat(${dim},1fr)`;
  document.getElementById('monthGrid').style.gridTemplateColumns=cols;

  // Header row
  let h='<div class="mch" style="border-right:1px solid var(--border)">Hab.</div>';
  days.forEach(d=>{
    const isT=sd(d,today),dn=['D','L','M','X','J','V','S'][d.getDay()];
    h+=`<div class="mch ${isT?'tc':''}">${d.getDate()}<br><span style="opacity:.5;font-size:9px">${dn}</span></div>`;
  });

  // Room rows — use relative container spanning all days with continuous bars
  ROOMS.forEach(r=>{
    h+=`<div class="mrl-month"><div class="rdot" style="background:${r.color}"></div><span style="font-size:9px;line-height:1.2">H${r.id}<br>${r.name}</span></div>`;

    // Container spanning all day columns
    h+=`<div style="grid-column:span ${dim};position:relative;height:36px;border-bottom:1px solid var(--border);">`;

    // Today highlight
    days.forEach((d,i)=>{
      if(sd(d,today)) h+=`<div style="position:absolute;left:${i/dim*100}%;width:${1/dim*100}%;top:0;bottom:0;background:rgba(200,169,110,.06);pointer-events:none"></div>`;
    });

    // Day separators
    days.forEach((_,i)=>{
      if(i>0) h+=`<div style="position:absolute;left:${i/dim*100}%;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none"></div>`;
    });

    // Draw booking bars
    const rbs=allBs().filter(b=>b.room==r.id);
    const bookingBsM=rbs.filter(b=>(b.source||'booking')==='booking');
    const airbnbBsM=rbs.filter(b=>b.source==='airbnb');
    const hasAirbnbM=airbnbBsM.some(b=>pd(b.checkIn)<=mEnd&&pd(b.checkOut)>mStart);
    const hasBookingM=bookingBsM.some(b=>pd(b.checkIn)<=mEnd&&pd(b.checkOut)>mStart);
    const splitM=hasAirbnbM&&hasBookingM;

    rbs.forEach(b=>{
      const ciD=pd(b.checkIn), coD=pd(b.checkOut);
      const mEnd1=addD(mEnd,1);
      if(ciD>=mEnd1||coD<=mStart)return;

      const src=b.source||'booking';
      const clr=srcClr(src), bg=srcBg(src);
      const bgDark=src==='airbnb'?'rgba(200,90,126,.55)':src==='manual'?'rgba(126,184,126,.5)':'rgba(74,126,184,.55)';

      const isStartVis=ciD>=mStart, isEndVis=coD<=mEnd1;

      // Half-day: check-in starts at middle of ci day, check-out ends at middle of co day
      const ciOffset=isStartVis?((ciD-mStart)/86400000+0.5)/dim:0;
      const coOffset=isEndVis?((coD-mStart)/86400000-0.5)/dim:1;
      const left=(Math.max(0,ciOffset)*100).toFixed(2);
      const width=(Math.max(0,coOffset-ciOffset)*100).toFixed(2);

      const top=splitM?(src==='airbnb'?20:4):4;
      const barH=splitM?12:28;
      const rl=`${isStartVis?'4px':'0'} ${isEndVis?'4px':'0'} ${isEndVis?'4px':'0'} ${isStartVis?'4px':'0'}`;

      h+=`<div style="position:absolute;left:${left}%;width:${width}%;top:${top}px;height:${barH}px;background:${bg};border-radius:${rl};z-index:2;cursor:pointer;"
        onclick="openModalDate('${r.id}','${fmt(ciD)}')" title="${b.guest||'Reservado'}: ${fmtD(b.checkIn)} → ${fmtD(b.checkOut)}">`;

      // Darker cap on check-in day
      if(isStartVis){
        h+=`<div style="position:absolute;left:0;top:0;bottom:0;width:${(0.5/dim*100).toFixed(2)}%;background:${bgDark};border-radius:4px 0 0 4px;"></div>`;
      }
      // Darker cap on check-out day
      if(isEndVis&&coD>mStart){
        const capW=(0.5/dim*100).toFixed(2);
        h+=`<div style="position:absolute;right:0;top:0;bottom:0;width:${capW}%;background:${bgDark};border-radius:0 4px 4px 0;"></div>`;
      }
      h+='</div>';
    });

    // Clickable day zones
    days.forEach((d,i)=>{
      h+=`<div style="position:absolute;left:${i/dim*100}%;width:${1/dim*100}%;top:0;bottom:0;z-index:1" onclick="openModalDate('${r.id}','${fmt(d)}')"></div>`;
    });

    h+='</div>';
  });

  document.getElementById('monthGrid').innerHTML=h;
}
function changeMonth(d){if(d===0)mOff=0;else mOff+=d;renderMonthly();}

// ── ROOMS TIMELINE ───────────────────────────────────────────────────────────
function renderRooms(){
  const end=addD(today,30),total=31;
  document.getElementById('roomTimelines').innerHTML=ROOMS.map(r=>{
    const rbs=allBs().filter(b=>{const ci=pd(b.checkIn),co=pd(b.checkOut);return b.room==r.id&&co>today&&ci<=end;});
    const bars=rbs.map(b=>{
      const ci=pd(b.checkIn),co=pd(b.checkOut);
      const sO=Math.max(0,(ci-today)/86400000),eO=Math.min(total,(co-today)/86400000);
      const l=(sO/total*100).toFixed(1),w=((eO-sO)/total*100).toFixed(1);
      const src=b.source||'booking';
      return `<div class="bbar bb-${src}" style="left:${l}%;width:${w}%;border-radius:3px" title="${b.guest||'Reservado'}: ${fmtD(b.checkIn)} → ${fmtD(b.checkOut)}">
        <span>${fmtD(b.checkIn)} → ${fmtD(b.checkOut)}${b.guest?' · '+b.guest:''}</span>
      </div>`;
    }).join('');
    const isM=b=>manualBs.find(m=>m.id===b.id);
    return `<div class="rtl">
      <div class="rtlh"><div class="rclrbar" style="background:${r.color}"></div>
        <div><div class="rtlt">H${r.id} — ${r.name}</div><div style="font-size:11px;color:var(--muted)">${rbs.length} reserva(s) · próximos 30 días</div></div>
      </div>
      <div class="rtlb">
        <div style="font-size:10px;color:var(--muted);margin-bottom:5px">${today.toLocaleDateString('es-ES',{day:'numeric',month:'short'})} → ${end.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})}</div>
        <div class="btrack">${bars}</div>
        ${rbs.map(b=>`<div class="bitem" style="margin-bottom:5px">
          <div class="sbadge sb-${b.source||'booking'}">${b.source||'booking'}</div>
          <div class="binfo"><div class="bguest">${b.guest||'Reservado'}</div><div class="bdates">${fmtD(b.checkIn)} → ${fmtD(b.checkOut)}${b.notes?' · '+b.notes:''}</div></div>
          ${isM(b)?`<button class="delbtn" onclick="deleteBooking('${b.id}')">🗑</button>`:''}</div>`).join('')}
        ${!rbs.length?'<div style="color:var(--muted);font-size:12px;padding:5px 0">Sin reservas en los próximos 30 días</div>':''}
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(rid,ds){
  document.getElementById('checkIn').value=ds||fmt(today);
  document.getElementById('checkOut').value=fmt(addD(today,1));
  if(rid)document.getElementById('roomSelect').value=rid;
  document.getElementById('guestName').value='';
  document.getElementById('notes').value='';
  document.getElementById('bookingSource').value='manual';
  document.getElementById('modalOverlay').classList.add('open');
}
function openModalDate(rid,ds){openModal(rid,ds);}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function saveBooking(){
  const guest=document.getElementById('guestName').value.trim();
  const room=parseInt(document.getElementById('roomSelect').value);
  const ci=document.getElementById('checkIn').value,co=document.getElementById('checkOut').value;
  const src=document.getElementById('bookingSource').value;
  const notes=document.getElementById('notes').value.trim();
  if(!ci||!co){alert('Selecciona fechas');return;}
  if(ci>=co){alert('Check-out debe ser posterior al check-in');return;}
  manualBs.push({id:Date.now().toString(),room,guest,checkIn:ci,checkOut:co,source:src,notes});
  saveD();closeModal();renderAll();
}
function deleteBooking(id){
  if(!confirm('¿Eliminar esta reserva?'))return;
  manualBs=manualBs.filter(b=>b.id!==id);saveD();renderAll();
}
function toggleTask(g,k){
  if(!tasks[g])tasks[g]={};tasks[g][k]=!tasks[g][k];
  localStorage.setItem('hm_tasks',JSON.stringify(tasks));renderDashboard();
}
function renderAll(){
  renderDashboard();
  const av=document.querySelector('.view.active')?.id?.replace('view-','');
  if(av==='weekly')renderWeekly();
  if(av==='monthly')renderMonthly();
  if(av==='rooms')renderRooms();
}

document.getElementById('headerDate').textContent=
  today.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

renderAll();
syncIcals();
setInterval(syncIcals,5*60*1000);
</script>
